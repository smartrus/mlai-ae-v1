<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Neural network nodes: 3 input, 1 hidden, 1 output -->
  <!-- Input layer nodes -->
  <circle cx="4" cy="9"  r="2.5" stroke="#0ea5e9" stroke-width="1.5" fill="rgba(14,165,233,0.10)"/>
  <circle cx="4" cy="16" r="2.5" stroke="#0ea5e9" stroke-width="1.5" fill="rgba(14,165,233,0.10)"/>
  <circle cx="4" cy="23" r="2.5" stroke="#0ea5e9" stroke-width="1.5" fill="rgba(14,165,233,0.10)"/>
  <!-- Hidden layer node -->
  <circle cx="16" cy="12" r="2.5" stroke="#0ea5e9" stroke-width="1.5" fill="rgba(14,165,233,0.10)"/>
  <circle cx="16" cy="20" r="2.5" stroke="#0ea5e9" stroke-width="1.5" fill="rgba(14,165,233,0.10)"/>
  <!-- Output node (filled accent) -->
  <circle cx="28" cy="16" r="3"   fill="#0ea5e9"/>
  <!-- Connections: input → hidden -->
  <line x1="6.5"  y1="9"  x2="13.5" y2="12" stroke="#0ea5e9" stroke-width="1"   opacity="0.5"/>
  <line x1="6.5"  y1="16" x2="13.5" y2="12" stroke="#0ea5e9" stroke-width="1"   opacity="0.5"/>
  <line x1="6.5"  y1="23" x2="13.5" y2="12" stroke="#0ea5e9" stroke-width="0.8" opacity="0.35"/>
  <line x1="6.5"  y1="9"  x2="13.5" y2="20" stroke="#0ea5e9" stroke-width="0.8" opacity="0.35"/>
  <line x1="6.5"  y1="16" x2="13.5" y2="20" stroke="#0ea5e9" stroke-width="1"   opacity="0.5"/>
  <line x1="6.5"  y1="23" x2="13.5" y2="20" stroke="#0ea5e9" stroke-width="1"   opacity="0.5"/>
  <!-- Connections: hidden → output -->
  <line x1="18.5" y1="12" x2="25"   y2="16" stroke="#0ea5e9" stroke-width="1.2" opacity="0.7"/>
  <line x1="18.5" y1="20" x2="25"   y2="16" stroke="#0ea5e9" stroke-width="1.2" opacity="0.7"/>
</svg>
