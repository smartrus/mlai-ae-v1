<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Dark background tile -->
  <rect width="512" height="512" fill="#09090b" rx="80"/>

  <!-- Neural network mark — nodes + connections, sky blue -->

  <!-- Input nodes (left column) -->
  <circle cx="120" cy="160" r="28" fill="#0ea5e9" opacity="0.9"/>
  <circle cx="120" cy="256" r="28" fill="#0ea5e9" opacity="0.9"/>
  <circle cx="120" cy="352" r="28" fill="#0ea5e9" opacity="0.9"/>

  <!-- Hidden layer nodes (center) -->
  <circle cx="256" cy="200" r="28" fill="#0ea5e9" opacity="0.65"/>
  <circle cx="256" cy="312" r="28" fill="#0ea5e9" opacity="0.65"/>

  <!-- Output node (right, brightest) -->
  <circle cx="392" cy="256" r="34" fill="#0ea5e9"/>
  <!-- Inner ring on output for depth -->
  <circle cx="392" cy="256" r="20" fill="#38bdf8" opacity="0.5"/>

  <!-- Connections: input → hidden -->
  <line x1="148" y1="160" x2="228" y2="200" stroke="#0ea5e9" stroke-width="10" stroke-linecap="round" opacity="0.45"/>
  <line x1="148" y1="256" x2="228" y2="200" stroke="#0ea5e9" stroke-width="10" stroke-linecap="round" opacity="0.45"/>
  <line x1="148" y1="352" x2="228" y2="200" stroke="#0ea5e9" stroke-width="7"  stroke-linecap="round" opacity="0.25"/>
  <line x1="148" y1="160" x2="228" y2="312" stroke="#0ea5e9" stroke-width="7"  stroke-linecap="round" opacity="0.25"/>
  <line x1="148" y1="256" x2="228" y2="312" stroke="#0ea5e9" stroke-width="10" stroke-linecap="round" opacity="0.45"/>
  <line x1="148" y1="352" x2="228" y2="312" stroke="#0ea5e9" stroke-width="10" stroke-linecap="round" opacity="0.45"/>

  <!-- Connections: hidden → output -->
  <line x1="284" y1="200" x2="358" y2="256" stroke="#0ea5e9" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <line x1="284" y1="312" x2="358" y2="256" stroke="#0ea5e9" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
</svg>
