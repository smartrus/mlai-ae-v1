<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#0ea5e9"/>
  <!-- Neural network: input nodes -->
  <circle cx="7" cy="10" r="2.5" fill="#ffffff"/>
  <circle cx="7" cy="16" r="2.5" fill="#ffffff"/>
  <circle cx="7" cy="22" r="2.5" fill="#ffffff"/>
  <!-- Hidden layer -->
  <circle cx="16" cy="12.5" r="2.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="16" cy="19.5" r="2.5" fill="#ffffff" opacity="0.8"/>
  <!-- Output node -->
  <circle cx="25" cy="16" r="3" fill="#ffffff"/>
  <!-- Connections: input to hidden -->
  <line x1="9.5" y1="10" x2="13.5" y2="12.5" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
  <line x1="9.5" y1="16" x2="13.5" y2="12.5" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
  <line x1="9.5" y1="16" x2="13.5" y2="19.5" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
  <line x1="9.5" y1="22" x2="13.5" y2="19.5" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
  <!-- Connections: hidden to output -->
  <line x1="18.5" y1="12.5" x2="22" y2="16" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
  <line x1="18.5" y1="19.5" x2="22" y2="16" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
</svg>
