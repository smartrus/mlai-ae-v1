<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Git branch / pipeline flow -->
  <!-- Main trunk -->
  <line x1="6" y1="4" x2="6" y2="20" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Branch point -->
  <circle cx="6"  cy="5"  r="2" stroke="#0ea5e9" stroke-width="1.5" fill="rgba(14,165,233,0.12)"/>
  <circle cx="6"  cy="19" r="2" stroke="#0ea5e9" stroke-width="1.5" fill="#0ea5e9"/>
  <!-- Branch arm -->
  <path d="M6 9 C6 13 18 11 18 15" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <circle cx="18" cy="15" r="2" stroke="#0ea5e9" stroke-width="1.5" fill="rgba(14,165,233,0.12)"/>
  <!-- Merge back -->
  <path d="M6 15 L6 15" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round"/>
</svg>
