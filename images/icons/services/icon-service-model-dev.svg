<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- CPU chip outline -->
  <rect x="7" y="7" width="10" height="10" rx="1.5" stroke="#0ea5e9" stroke-width="1.5" fill="rgba(14,165,233,0.08)"/>
  <!-- Inner core -->
  <rect x="9.5" y="9.5" width="5" height="5" rx="0.5" stroke="#0ea5e9" stroke-width="1" opacity="0.6"/>
  <!-- Pins top -->
  <line x1="9.5"  y1="7" x2="9.5"  y2="4.5" stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12"   y1="7" x2="12"   y2="4.5" stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14.5" y1="7" x2="14.5" y2="4.5" stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Pins bottom -->
  <line x1="9.5"  y1="17" x2="9.5"  y2="19.5" stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12"   y1="17" x2="12"   y2="19.5" stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14.5" y1="17" x2="14.5" y2="19.5" stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Pins left -->
  <line x1="7" y1="9.5"  x2="4.5" y2="9.5"  stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="7" y1="12"   x2="4.5" y2="12"   stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="7" y1="14.5" x2="4.5" y2="14.5" stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Pins right -->
  <line x1="17" y1="9.5"  x2="19.5" y2="9.5"  stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="17" y1="12"   x2="19.5" y2="12"   stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="17" y1="14.5" x2="19.5" y2="14.5" stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round"/>
</svg>
